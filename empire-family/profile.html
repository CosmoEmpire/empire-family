<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Профиль | Empire Family</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111;
      border-bottom: 2px solid #ffcc00;
    }

    h1 { color: #ffcc00; margin: 0; }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #1e1e1e;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,204,0,0.3);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: white;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .hidden { display: none; }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #333;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }
  </style>
</head>
<body>

<header style="position:relative; overflow:hidden; background: linear-gradient(270deg, #111111, #1a1a1a, #111111); background-size:600% 600%; animation: gradientShift 15s ease infinite; padding:40px 0; text-align:center;">
  <style>
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes shineMove {
      0% { transform: rotate(45deg) translate(-100%, -100%); }
      100% { transform: rotate(45deg) translate(100%, 100%); }
    }
    @keyframes textGlow {
      0%,100% { color:#ffcc00; text-shadow:2px 2px 6px rgba(0,0,0,0.7);} 
      50% { color:#ffd633; text-shadow:2px 2px 12px rgba(255,204,0,0.8);} 
    }

    .header-avatar {
      position: absolute;
      top: 20px;
      right: 30px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      border: 2px solid #ffcc00;
    }
  </style>

  <div style="position:relative; display:flex; justify-content:center; align-items:center; gap:20px; flex-wrap:wrap; z-index:1;">
    <img src="https://i.ibb.co/BHz6q3XP/logo.png" style="height:100px;">
    <h1 style="font-size:50px; letter-spacing:4px; animation:textGlow 3s ease-in-out infinite; margin:0;">Empire Профиль</h1>
  </div>

  <div class="header-avatar" id="headerAvatar">👤</div>

  <div style="position:absolute; top:-50%; left:-50%; width:200%; height:200%; background: linear-gradient(120deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.05) 100%); transform: rotate(45deg); animation: shineMove 6s linear infinite;"></div>

  <nav style="margin-top:20px; position:relative; z-index:2;">
    <a href="index.html" style="color:white; margin:0 15px; text-decoration:none;">Главная</a>
    <a href="#" style="color:#ffcc00; margin:0 15px; text-decoration:none;">Профиль</a>
  </nav>
</header>

<!-- CHOICE -->
<div class="container" id="choiceBox">
  <h2>Добро пожаловать</h2>
  <p>Выберите действие:</p>
  <button onclick="showLogin()">Войти</button>
  <button onclick="showRegister()">Зарегистрироваться</button>
</div>

<!-- LOGIN -->
<div class="container hidden" id="loginBox">
  <h2>Вход</h2>
  <input type="text" id="login" placeholder="Логин">
  <input type="password" id="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<!-- REGISTER -->
<div class="container hidden" id="registerBox">
  <h2>Регистрация</h2>
  <input type="text" id="regLogin" placeholder="Придумайте логин">
  <input type="password" id="regPassword" placeholder="Придумайте пароль">
  <button onclick="register()">Создать аккаунт</button>
</div>

<!-- PROFILE -->
<div class="container hidden" id="profileBox">
  <div class="avatar" id="avatar">👤</div>
  <input type="file" id="avatarInput" accept="image/*">
  <h2 id="name"></h2>
  <p><b>Discord:</b> <span id="discord"></span></p>
  <p><b>Статик:</b> <span id="static"></span></p>
  <p><b>Цель:</b> <span id="goal"></span></p>
  <button onclick="logout()">Выйти</button>
</div>

<script>
  function showLogin() {
    hideAll();
    document.getElementById('loginBox').classList.remove('hidden');
  }

  function showRegister() {
    hideAll();
    document.getElementById('registerBox').classList.remove('hidden');
  }

  function hideAll() {
    document.getElementById('choiceBox').classList.add('hidden');
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('registerBox').classList.add('hidden');
    document.getElementById('profileBox').classList.add('hidden');
  }

  function register() {
    const login = document.getElementById('regLogin').value;
    const password = document.getElementById('regPassword').value;

    localStorage.setItem('user', JSON.stringify({ login, password }));
    alert('Аккаунт создан!');
    showLogin();
  }

  function login() {
    const login = document.getElementById('login').value;
    const password = document.getElementById('password').value;

    const user = JSON.parse(localStorage.getItem('user'));

    if (user && login === user.login && password === user.password) {
      localStorage.setItem('auth', 'true');
      showProfile();
    } else {
      alert('Неверный логин или пароль');
    }
  }

  function logout() {
    localStorage.removeItem('auth');
    location.reload();
  }

  function showProfile() {
    hideAll();
    document.getElementById('profileBox').classList.remove('hidden');

    const profile = JSON.parse(localStorage.getItem('profile'));

    if (profile) {
      document.getElementById('name').textContent = profile.realname;
      document.getElementById('discord').textContent = profile.discord;
      document.getElementById('static').textContent = profile.static;
      document.getElementById('goal').textContent = profile.goal;

      if (profile.avatar) {
        document.getElementById('avatar').innerHTML = `<img src="${profile.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
        document.getElementById('headerAvatar').innerHTML = `<img src="${profile.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
      } else {
        const letter = profile.realname.charAt(0).toUpperCase();
        document.getElementById('avatar').textContent = letter;
        document.getElementById('headerAvatar').textContent = letter;
      }
    }
  }

  if (localStorage.getItem('auth') === 'true') {
    showProfile();
  }

  // загрузка аватарки
  document.getElementById('avatarInput').addEventListener('change', function () {
    const file = this.files[0];
    const reader = new FileReader();

    reader.onload = function () {
      const profile = JSON.parse(localStorage.getItem('profile')) || {};
      profile.avatar = reader.result;
      localStorage.setItem('profile', JSON.stringify(profile));
      location.reload();
    };

    if (file) {
      reader.readAsDataURL(file);
    }
  });
</script>

</body>
</html>
