<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Профиль - Empire Family</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 50px; }
    .avatar { border-radius: 50%; width: 120px; height: 120px; }
    ul { list-style: none; padding: 0; }
    li { background: rgba(255,204,0,0.2); margin: 5px 0; padding: 5px 10px; border-radius: 8px; display: inline-block; }
    a.logout { color: #ffcc00; display: block; margin-top: 20px; text-decoration: none; font-weight: bold; }
    a.logout:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="profile">Загрузка профиля...</div>

  <script>
    function getCookie(name){
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if(parts.length===2) return parts.pop().split(';').shift();
    }

    const userCookie = getCookie('discord_user');
    const container = document.getElementById('profile');

    if(userCookie){
      const user = JSON.parse(userCookie);
      container.innerHTML = `
        <img src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png" class="avatar">
        <h2>${user.username}#${user.discriminator}</h2>
        <p>ID: ${user.id}</p>
        <h3>Роли на сервере:</h3>
        <ul>${user.roles.map(r=>`<li>${r}</li>`).join('')}</ul>
        <a href="/api/logout" class="logout">Выйти</a>
      `;
    } else {
      container.innerHTML = `<p>Вы не авторизованы. <a href="/api/auth">Войти через Discord</a></p>`;
    }
  </script>
</body>
</html>
