<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Профиль | Empire Family</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111;
      border-bottom: 2px solid #ffcc00;
    }

    h1 { color: #ffcc00; margin: 0; }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #1e1e1e;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,204,0,0.3);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: white;
    }

    button {
      padding: 12px;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden { display: none; }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #333;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }
  </style>
</head>
<body>

<header>
  <h1>Профиль</h1>
</header>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <h2>Вход</h2>
  <input type="text" id="login" placeholder="Логин">
  <input type="password" id="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<!-- PROFILE -->
<div class="container hidden" id="profileBox">
  <div class="avatar" id="avatar">👤</div>
  <h2 id="name"></h2>
  <p><b>Discord:</b> <span id="discord"></span></p>
  <p><b>Статик:</b> <span id="static"></span></p>
  <p><b>Цель:</b> <span id="goal"></span></p>
  <button onclick="logout()">Выйти</button>
</div>

<script>
  const USER_LOGIN = "admin";
  const USER_PASSWORD = "1234";

  function login() {
    const login = document.getElementById('login').value;
    const password = document.getElementById('password').value;

    if (login === USER_LOGIN && password === USER_PASSWORD) {
      localStorage.setItem('auth', 'true');
      showProfile();
    } else {
      alert('Неверный логин или пароль');
    }
  }

  function logout() {
    localStorage.removeItem('auth');
    location.reload();
  }

  function showProfile() {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('profileBox').classList.remove('hidden');

    const profile = JSON.parse(localStorage.getItem('profile'));

    if (profile) {
      document.getElementById('name').textContent = profile.realname;
      document.getElementById('discord').textContent = profile.discord;
      document.getElementById('static').textContent = profile.static;
      document.getElementById('goal').textContent = profile.goal;
      document.getElementById('avatar').textContent = profile.realname.charAt(0).toUpperCase();
    }
  }

  // авто-вход
  if (localStorage.getItem('auth') === 'true') {
    showProfile();
  }
</script>

</body>
</html>
