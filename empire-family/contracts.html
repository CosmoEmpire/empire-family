<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Контракты - Empire Family</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a, #111111);
      color: white;
      scroll-behavior: smooth;
    }

    /* --- Header с анимацией --- */
    header {
      padding: 40px 0;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(270deg, #111111, #1a1a1a, #111111);
      background-size: 600% 600%;
      animation: gradientShift 15s ease infinite;
    }

    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(120deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.05) 100%);
      transform: rotate(45deg);
      animation: shineMove 6s linear infinite;
      pointer-events: none;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes shineMove {
      0% { transform: rotate(45deg) translate(-100%, -100%); }
      100% { transform: rotate(45deg) translate(100%, 100%); }
    }

    header h1 {
      font-size: 60px;
      color: #ffcc00;
      margin: 0;
      letter-spacing: 5px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
      z-index: 2;
      position: relative;
      animation: textGlow 3s ease-in-out infinite;
    }

    @keyframes textGlow {
      0%,100% { color: #ffcc00; text-shadow: 2px 2px 6px rgba(0,0,0,0.7);}
      50% { color: #ffd633; text-shadow: 2px 2px 12px rgba(255,204,0,0.8);}
    }

    nav { margin-top: 20px; position: relative; z-index: 2; }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 18px;
      transition: 0.3s;
    }
    nav a:hover { color: #ffcc00; }

    .profile-btn {
      padding: 10px 20px;
      background: #ffcc00;
      color: #111;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .profile-btn:hover { background: #e6b800; }

    /* --- Sections --- */
    section { padding: 80px 20px; text-align: center; }
    section h2 { font-size: 40px; margin-bottom: 30px; color: #ffcc00; }
    section p { font-size: 18px; max-width: 700px; margin: auto; line-height: 1.6; }

    /* --- Contract Form --- */
    .contract-form {
      display: flex;
      flex-direction: column;
      max-width: 500px;
      margin: 30px auto 0;
      gap: 15px;
    }
    .contract-form input,
    .contract-form textarea {
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 16px;
      resize: none;
      transition: 0.3s;
    }
    .contract-form input:focus,
    .contract-form textarea:focus {
      outline: none;
      border-color: #ffcc00;
      box-shadow: 0 0 10px rgba(255,204,0,0.5);
    }
    .contract-form button {
      padding: 15px;
      background: #ffcc00;
      color: #111;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }
    .contract-form button:hover { background: #e6b800; }

    footer {
      background: rgba(17,17,17,0.9);
      padding: 30px 0;
      font-size: 14px;
      text-align: center;
    }

    @media(max-width: 800px){
      header h1 { font-size: 40px; }
      nav a { margin: 5px; font-size: 16px; }
    }

    /* --- Плавное появление шапки --- */
    header { animation: headerFade 1.5s ease; }
    @keyframes headerFade {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <h1>Empire Family - Контракты</h1>
  <nav>
    <a href="index.html">Главная</a>
    <a href="contracts.html" class="profile-btn">Контракты</a>
  </nav>
</header>

<section>
  <h2>Отправьте свой контракт</h2>
  <p>Если вы хотите предложить контракт или задание, заполните форму ниже.</p>

  <form id="contractForm" class="contract-form">
    <input type="text" name="name" placeholder="Ваше имя" required>
    <input type="text" name="discord" placeholder="Ваш Discord" required>
    <textarea name="details" placeholder="Описание контракта" required></textarea>
    <button type="submit">Отправить контракт</button>
  </form>
</section>

<script>
  const form = document.getElementById('contractForm');
  const DISCORD_WEBHOOK_URL = "ВАШ_WEBHOOK_ЗДЕСЬ"; // вставь сюда свой Discord Webhook

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    const data = {
      content: `**Новый контракт**\n` +
               `**Имя:** ${formData.get('name')}\n` +
               `**Discord:** ${formData.get('discord')}\n` +
               `**Описание:** ${formData.get('details')}`
    };

    try {
      const response = await fetch(DISCORD_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if(response.ok) {
        alert('Контракт успешно отправлен!');
        form.reset();
      } else {
        alert('Ошибка при отправке контракта. Попробуйте позже.');
      }
    } catch (err) {
      console.error(err);
      alert('Ошибка при отправке контракта. Попробуйте позже.');
    }
  });
</script>

<footer>
  © 2026 Empire Family. Все права защищены.
</footer>

</body>
</html>
