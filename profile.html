```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Профиль | Empire Family</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #111;
  border-bottom: 2px solid #ffcc00;
}

h1 { color: #ffcc00; }

.container {
  max-width: 600px;
  margin: 40px auto;
  background: #1e1e1e;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,204,0,0.3);
}

.hidden { display: none; }

/* ===== БЛОКИ ===== */
.block {
  background: linear-gradient(145deg, #1f1f1f, #2a2a2a);
  padding: 20px;
  margin-top: 20px;
  border-radius: 15px;
  position: relative;
  overflow: hidden;
}

.block h3 {
  color: #ffcc00;
}

.block ul {
  list-style: none;
  padding: 0;
}

.block li {
  background: #333;
  margin: 6px 0;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

/* свечение */
.block::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,204,0,0.2), transparent);
  animation: shine 6s linear infinite;
}

@keyframes shine {
  0% { transform: translate(-100%, -100%) rotate(45deg); }
  100% { transform: translate(100%, 100%) rotate(45deg); }
}

/* статистика */
.stat {
  display: flex;
  justify-content: space-between;
  background: #2f2f2f;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  margin-top: 15px;
  width: 100%;
  background: #ffcc00;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
<h1>Empire Profile</h1>
</header>

<div class="container hidden" id="profileBox">

<h2 id="name"></h2>

<div class="block">
<h3>📊 Статистика</h3>

<div class="stat">
<span>Контракты</span>
<b id="contracts">0</b>
</div>

<div class="stat">
<span>Заработано</span>
<b id="money">0$</b>
</div>
</div>

<div class="block">
<h3>📜 История контрактов</h3>
<ul id="history"></ul>
</div>

<div class="block">
<h3>💰 Премии</h3>
<ul id="bonuses"></ul>
</div>

<button onclick="logout()">Выйти</button>

</div>

<script>

function showProfile() {
  document.getElementById('profileBox').classList.remove('hidden');

  const profile = JSON.parse(localStorage.getItem('profile'));
  if (!profile) return;

  document.getElementById('name').textContent = profile.login;

  document.getElementById('contracts').textContent = profile.contracts || 0;
  document.getElementById('money').textContent = (profile.money || 0) + "$";

  renderHistory();
  renderBonuses();
}

function renderHistory() {
  const profile = JSON.parse(localStorage.getItem('profile'));
  const list = document.getElementById('history');

  list.innerHTML = "";

  (profile.history || []).forEach(item => {
    const li = document.createElement('li');
    li.innerHTML = `<span>📜 ${item}</span><span>✔</span>`;
    list.appendChild(li);
  });
}

function renderBonuses() {
  const profile = JSON.parse(localStorage.getItem('profile'));
  const list = document.getElementById('bonuses');

  list.innerHTML = "";

  (profile.bonuses || []).forEach(item => {
    const li = document.createElement('li');
    li.innerHTML = `<span>💰 ${item}</span><span>+$</span>`;
    list.appendChild(li);
  });
}

function logout() {
  localStorage.removeItem('auth');
  location.reload();
}

// авто вход
if (localStorage.getItem('auth') === 'true') {
  showProfile();
}

</script>

</body>
</html>
```
